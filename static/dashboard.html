<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #e2e2e8;
            min-height: 100vh;
        }
        .nav {
            background: #12121a;
            border-bottom: 1px solid #2a2a3e;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .nav-left { display: flex; align-items: center; gap: 24px; }
        .nav-logo { color: #f59e0b; font-weight: 700; font-size: 18px; }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a {
            color: #8888a0;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: #e2e2e8; background: #1a1a28; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .btn-logout {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid #2a2a3e;
            color: #ef4444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.1); border-color: #ef4444; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card {
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 20px;
        }
        .card-label { font-size: 12px; color: #8888a0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: 700; }
        .card-value.green { color: #10b981; }
        .card-value.red { color: #ef4444; }
        .card-value.gold { color: #f59e0b; }
        .card-value.blue { color: #3b82f6; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .chart-container { position: relative; height: 300px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #c0c0d0; }
        .progress-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .progress-item { background: #12121a; border: 1px solid #2a2a3e; border-radius: 10px; padding: 16px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .progress-name { font-weight: 500; }
        .progress-numbers { color: #8888a0; }
        .progress-bar {
            height: 8px;
            background: #1a1a28;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-fill.green { background: #10b981; }
        .progress-fill.gold { background: #f59e0b; }
        .progress-fill.blue { background: #3b82f6; }
        .progress-fill.red { background: #ef4444; }
        .transactions-table { width: 100%; border-collapse: collapse; }
        .transactions-table th {
            text-align: left;
            padding: 10px 12px;
            font-size: 12px;
            color: #8888a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2a3e;
        }
        .transactions-table td {
            padding: 10px 12px;
            font-size: 14px;
            border-bottom: 1px solid #1a1a28;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.expense { background: rgba(239,68,68,0.15); color: #ef4444; }
        .badge.income { background: rgba(16,185,129,0.15); color: #10b981; }
        .empty-state { text-align: center; padding: 40px; color: #8888a0; }
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .nav { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <div class="nav-logo">💰 Finance</div>
            <div class="nav-links">
                <a href="/dashboard.html" class="active">Dashboard</a>
                <a href="/admin.html">Admin</a>
            </div>
        </div>
        <div class="nav-right">
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="summary-cards" id="summaryCards"></div>
        <div class="charts-row">
            <div class="card">
                <div class="card-label">Spending by Category</div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="card-label">Monthly Trend</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="section-title" id="debtSectionTitle" style="display:none;">📋 Debts</div>
        <div class="progress-list" id="debtList"></div>

        <div class="section-title" id="wishSectionTitle" style="display:none;">⭐ Wishlist</div>
        <div class="progress-list" id="wishlistList"></div>

        <div class="section-title">Recent Transactions</div>
        <div class="card">
            <table class="transactions-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Merchant</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let categoryChart = null;
        let trendChart = null;

        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                if (!res.ok) window.location.href = '/login.html';
            } catch { window.location.href = '/login.html'; }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        function formatCurrency(amount, currency = 'IDR') {
            if (currency === 'IDR') {
                return 'Rp ' + Number(amount).toLocaleString('id-ID');
            }
            return currency + ' ' + Number(amount).toLocaleString();
        }

        function getMonthStr() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        }

        async function loadData() {
            try {
                const month = getMonthStr();
                const [summaryRes, txRes] = await Promise.all([
                    fetch('/api/summary'),
                    fetch(`/api/transactions?month=${month}&limit=20`)
                ]);
                const summary = await summaryRes.json();
                const transactions = await txRes.json();

                renderSummary(summary);
                renderCategoryChart(summary.categories);
                renderTrendChart();
                renderDebts(summary.debts);
                renderWishlist(summary.wishlist);
                renderTransactions(transactions);
            } catch (err) {
                console.error('Load error:', err);
            }
        }

        function renderSummary(s) {
            document.getElementById('summaryCards').innerHTML = `
                <div class="card">
                    <div class="card-label">Income This Month</div>
                    <div class="card-value green">${formatCurrency(s.income_this_month)}</div>
                </div>
                <div class="card">
                    <div class="card-label">Expenses This Month</div>
                    <div class="card-value red">${formatCurrency(s.expenses_this_month)}</div>
                </div>
                <div class="card">
                    <div class="card-label">Balance</div>
                    <div class="card-value ${s.balance >= 0 ? 'gold' : 'red'}">${formatCurrency(s.balance)}</div>
                </div>
            `;
        }

        function renderCategoryChart(categories) {
            if (!categories || categories.length === 0) {
                document.getElementById('categoryChart').parentElement.innerHTML = '<div class="empty-state">No expense data this month</div>';
                return;
            }
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();

            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories.map(c => c.category),
                    datasets: [{
                        data: categories.map(c => c.total),
                        backgroundColor: colors.slice(0, categories.length),
                        borderColor: '#12121a',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#a0a0b8', padding: 16 }
                        }
                    }
                }
            });
        }

        async function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();

            // Get last 6 months
            const months = [];
            const d = new Date();
            for (let i = 5; i >= 0; i--) {
                const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
                months.push(m.getFullYear() + '-' + String(m.getMonth() + 1).padStart(2, '0'));
            }

            const incomeData = [];
            const expenseData = [];
            const labels = [];

            for (const m of months) {
                const [y, mo] = m.split('-');
                try {
                    const res = await fetch(`/api/summary?year=${y}&month=${mo}`);
                    const s = await res.json();
                    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    labels.push(monthNames[parseInt(mo) - 1]);
                    incomeData.push(s.income_this_month);
                    expenseData.push(s.expenses_this_month);
                } catch { 
                    labels.push(m);
                    incomeData.push(0);
                    expenseData.push(0);
                }
            }

            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Income',
                            data: incomeData,
                            backgroundColor: 'rgba(16,185,129,0.6)',
                            borderColor: '#10b981',
                            borderWidth: 1,
                            borderRadius: 4
                        },
                        {
                            label: 'Expenses',
                            data: expenseData,
                            backgroundColor: 'rgba(239,68,68,0.6)',
                            borderColor: '#ef4444',
                            borderWidth: 1,
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#a0a0b8', padding: 16 }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#8888a0' },
                            grid: { color: '#1a1a28' }
                        },
                        y: {
                            ticks: { color: '#8888a0' },
                            grid: { color: '#1a1a28' }
                        }
                    }
                }
            });
        }

        function renderDebts(debts) {
            const container = document.getElementById('debtList');
            const title = document.getElementById('debtSectionTitle');
            if (!debts || debts.length === 0) {
                title.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            title.style.display = 'block';
            container.innerHTML = debts.map(d => {
                const pct = d.percentage.toFixed(1);
                return `
                    <div class="progress-item">
                        <div class="progress-header">
                            <span class="progress-name">${d.name}</span>
                            <span class="progress-numbers">${formatCurrency(d.remaining)} / ${formatCurrency(d.total_amount)} (${pct}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill red" style="width:${pct}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderWishlist(wishlist) {
            const container = document.getElementById('wishlistList');
            const title = document.getElementById('wishSectionTitle');
            if (!wishlist || wishlist.length === 0) {
                title.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            title.style.display = 'block';
            container.innerHTML = wishlist.map(w => {
                const pct = w.target_amount > 0 ? ((w.saved_amount / w.target_amount) * 100).toFixed(1) : 0;
                return `
                    <div class="progress-item">
                        <div class="progress-header">
                            <span class="progress-name">${w.name} ${w.achieved ? '✅' : ''}</span>
                            <span class="progress-numbers">${formatCurrency(w.saved_amount)} / ${formatCurrency(w.target_amount)} (${pct}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${w.achieved ? 'green' : 'gold'}" style="width:${pct}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactionsBody');
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions this month</td></tr>';
                return;
            }
            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td><span class="badge ${t.type}">${t.type}</span></td>
                    <td>${t.category || 'Other'}</td>
                    <td class="${t.type === 'income' ? 'green' : 'red'}" style="font-weight:500">${formatCurrency(t.amount, t.currency)}</td>
                    <td>${t.merchant || '-'}</td>
                </tr>
            `).join('');
        }

        checkAuth().then(loadData);
    </script>
</body>
</html>
