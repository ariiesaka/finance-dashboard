<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f;
    color: #e5e5e5;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid #2a2a3e;
    background: #12121a;
  }
  nav h2 { font-size: 16px; font-weight: 700; color: #fff; }
  nav button {
    background: none;
    border: 1px solid #2a2a3e;
    color: #888;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  nav button:hover { border-color: #ef4444; color: #ef4444; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: #12121a;
    border-radius: 12px;
    padding: 4px;
    border: 1px solid #2a2a3e;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .tab:hover { color: #aaa; }
  .tab.active {
    background: #f59e0b;
    color: #0a0a0f;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card {
    background: #12121a;
    border: 1px solid #2a2a3e;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h3 {
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }
  .summary-box {
    background: #0a0a0f;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    border: 1px solid #2a2a3e;
  }
  .summary-box .value { font-size: 24px; font-weight: 800; color: #fff; margin-top: 4px; }
  .summary-box .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .value.green { color: #34d399; }
  .value.red { color: #ef4444; }
  .value.gold { color: #f59e0b; }

  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-group { flex: 1; min-width: 120px; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #2a2a3e;
    background: #0a0a0f;
    color: #e5e5e5;
    font-size: 13px;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: #f59e0b; }
  .form-group select option { background: #12121a; }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #f59e0b;
    color: #0a0a0f;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .btn:hover { background: #d97706; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover { background: #991b1b; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .cancel-btn { background: #2a2a3e; color: #aaa; margin-left: 4px; }
  .cancel-btn:hover { background: #3a3a5e; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 10px;
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #2a2a3e;
  }
  td {
    padding: 10px;
    border-bottom: 1px solid #1a1a2e;
  }
  .category-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: #2a2a3e;
    color: #93c5fd;
  }
  .cat-chart-container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .cat-chart { width: 180px; height: 180px; }
  .cat-list { flex: 1; min-width: 200px; }
  .cat-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a2e;
    font-size: 13px;
  }
  .cat-item .cat-name { color: #ccc; }
  .cat-item .cat-amount { color: #f59e0b; font-weight: 600; }
  .delete-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .delete-btn:hover { color: #ef4444; background: #2a1a1a; }
  .empty-state { color: #555; text-align: center; padding: 20px; font-size: 13px; }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .month-nav h3 { margin-bottom: 0; }
  .month-nav button {
    background: #2a2a3e;
    border: none;
    color: #ccc;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .month-nav button:hover { background: #3a3a5e; }
  .month-nav span { font-size: 14px; font-weight: 600; color: #fff; min-width: 80px; text-align: center; }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 8px;
    background: #1a1a2e;
    border-radius: 4px;
    overflow: hidden;
    margin: 6px 0;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-fill.high { background: #34d399; }
  .progress-fill.medium { background: #f59e0b; }
  .progress-fill.low { background: #3b82f6; }

  .priority-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .priority-badge.high { background: #065f46; color: #6ee7b7; }
  .priority-badge.medium { background: #78350f; color: #fbbf24; }
  .priority-badge.low { background: #1e3a5f; color: #93c5fd; }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    display: none;
    z-index: 100;
  }
  .toast.success { background: #065f46; display: block; }
  .toast.error { background: #7f1d1d; display: block; }

  @media (max-width: 600px) {
    .form-row { flex-direction: column; }
    .form-group { min-width: 100%; }
  }
</style>
</head>
<body>
<nav>
  <h2>📊 Finance Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

  <div id="toast" class="toast"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('expenses')" id="tab-expenses">📝 Expenses</button>
    <button class="tab" onclick="switchTab('debts')" id="tab-debts">💳 Debts</button>
    <button class="tab" onclick="switchTab('goals')" id="tab-goals">🎯 Goals</button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       TAB: EXPENSES
       ═══════════════════════════════════════════════════════════ -->
  <div class="tab-content active" id="tab-content-expenses">

    <div class="card">
      <h3>This Month</h3>
      <div class="summary-grid">
        <div class="summary-box">
          <div class="label">Expenses</div>
          <div class="value red" id="totalExpenses">—</div>
        </div>
        <div class="summary-box">
          <div class="label">Categories</div>
          <div class="value gold" id="totalCategories">—</div>
        </div>
        <div class="summary-box">
          <div class="label">Transactions</div>
          <div class="value" style="color:#fff" id="totalTransactions">—</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Add Expense</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Merchant</label>
          <input type="text" id="merchant" placeholder="e.g. Wingstop" autofocus>
        </div>
        <div class="form-group" style="max-width: 100px;">
          <label>Amount</label>
          <input type="number" id="amount" placeholder="0" step="100">
        </div>
        <div class="form-group" style="max-width: 140px;">
          <label>Category</label>
          <select id="category">
            <option value="Food & Drink">Food & Drink</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills & Utilities">Bills & Utilities</option>
            <option value="Health">Health</option>
            <option value="Personal Care">Personal Care</option>
            <option value="Subscription">Subscription</option>
            <option value="Transfer">Transfer</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group" style="max-width: 130px;">
          <label>Date</label>
          <input type="date" id="expenseDate">
        </div>
        <div class="form-group" style="max-width: 100px; align-self: flex-end;">
          <button class="btn" onclick="addExpense()" id="addExpenseBtn">Add</button>
          <button class="btn cancel-btn" onclick="cancelEdit()" id="cancelEditBtn" style="display:none">Cancel</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Date Range</h3>
      <div class="form-row" style="margin-bottom:8px">
        <div class="form-group" style="max-width:160px">
          <label>From</label>
          <input type="date" id="startDate" min="2026-06-01">
        </div>
        <div class="form-group" style="max-width:160px">
          <label>To</label>
          <input type="date" id="endDate">
        </div>
        <div class="form-group" style="max-width:80px;align-self:flex-end">
          <button class="btn btn-sm" onclick="loadRange()">Apply</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm preset-btn" onclick="presetRange('thisMonth')" style="background:#1e3a5f;color:#93c5fd">This Month</button>
        <button class="btn btn-sm preset-btn" onclick="presetRange('lastMonth')" style="background:#78350f;color:#fbbf24">Last Month</button>
        <button class="btn btn-sm preset-btn" onclick="presetRange('all')" style="background:#065f46;color:#6ee7b7">All</button>
      </div>
    </div>

    <div class="card">
      <h3>Spending by Category</h3>
      <div class="cat-chart-container">
        <div class="cat-chart"><canvas id="categoryChart"></canvas></div>
        <div class="cat-list" id="categoryList"></div>
      </div>
    </div>

    <div class="card">
      <div id="rangeLabel" style="font-size:13px;color:#888;margin-bottom:10px"></div>
      <table>
        <thead>
          <tr><th>Date</th><th>Merchant</th><th>Category</th><th style="text-align:right">Amount</th><th></th><th></th></tr>
        </thead>
        <tbody id="expenseList"></tbody>
      </table>
      <div class="empty-state" id="emptyState">No expenses yet. Add one above!</div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════
       TAB: DEBTS
       ═══════════════════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-content-debts">

    <div id="debtSummary" class="card" style="display:none">
      <h3>Debt Overview</h3>
      <div class="summary-grid">
        <div class="summary-box">
          <div class="label">Total Debt</div>
          <div class="value red" id="totalDebtAmount">—</div>
        </div>
        <div class="summary-box">
          <div class="label">Total Paid</div>
          <div class="value green" id="totalDebtPaid">—</div>
        </div>
        <div class="summary-box">
          <div class="label">Remaining</div>
          <div class="value gold" id="totalDebtRemaining">—</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Add Debt</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="debtName" placeholder="e.g. DBS Loan">
        </div>
        <div class="form-group" style="max-width: 120px;">
          <label>Amount</label>
          <input type="number" id="debtAmount" placeholder="0">
        </div>
        <div class="form-group" style="max-width: 120px;">
          <label>Priority</label>
          <select id="debtPriority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🔵 Low</option>
          </select>
        </div>
        <div class="form-group" style="max-width: 100px; align-self: flex-end;">
          <button class="btn" onclick="addDebt()">Add</button>
        </div>
      </div>
    </div>

    <div id="debtList"></div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════
       TAB: GOALS
       ═══════════════════════════════════════════════════════════ -->
  <div class="tab-content" id="tab-content-goals">

    <div class="card">
      <h3>Add Goal / Wishlist</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="goalName" placeholder="e.g. PC Build">
        </div>
        <div class="form-group" style="max-width: 120px;">
          <label>Target</label>
          <input type="number" id="goalTarget" placeholder="0">
        </div>
        <div class="form-group" style="max-width: 120px;">
          <label>Priority</label>
          <select id="goalPriority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🔵 Low</option>
          </select>
        </div>
        <div class="form-group" style="max-width: 100px; align-self: flex-end;">
          <button class="btn" onclick="addGoal()">Add</button>
        </div>
      </div>
    </div>

    <div id="goalList"></div>

  </div>

</div>

<script>
const MIN_DATE = '2026-06-01';
let chartInstance = null;
let editId = null; // currently editing transaction id, null if adding new
let dataMinDate = null;
let dataMaxDate = null;

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function monthStart(d) {
  if (!d) d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01';
}

function monthEnd(d) {
  if (!d) d = new Date();
  // Last day of the month
  const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return last.toISOString().split('T')[0];
}

function prevMonthStart(d) {
  if (!d) d = new Date();
  const prev = new Date(d.getFullYear(), d.getMonth() - 1, 1);
  return monthStart(prev);
}

function prevMonthEnd(d) {
  if (!d) d = new Date();
  const prev = new Date(d.getFullYear(), d.getMonth(), 0);
  return prev.toISOString().split('T')[0];
}

document.getElementById('expenseDate').value = todayStr();

async function initDates() {
  const data = await api('/api/expenses/date-range');
  dataMinDate = data.min_date;
  dataMaxDate = data.max_date;

  const startInput = document.getElementById('startDate');
  const endInput = document.getElementById('endDate');
  endInput.max = todayStr();
  startInput.min = MIN_DATE;

  if (dataMinDate && dataMaxDate) {
    // Default: show the latest full month that has data
    const maxD = new Date(dataMaxDate + 'T00:00:00');
    startInput.value = monthStart(maxD);
    endInput.value = dataMaxDate;
  } else {
    startInput.value = monthStart();
    endInput.value = todayStr();
  }

  loadRange();
}

function presetRange(preset) {
  const startInput = document.getElementById('startDate');
  const endInput = document.getElementById('endDate');

  switch (preset) {
    case 'thisMonth':
      startInput.value = monthStart();
      endInput.value = todayStr();
      break;
    case 'lastMonth':
      startInput.value = prevMonthStart();
      endInput.value = prevMonthEnd();
      break;
    case 'all':
      if (dataMinDate && dataMaxDate) {
        startInput.value = dataMinDate;
        endInput.value = dataMaxDate;
      }
      break;
  }
  loadRange();
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts
  });
  return res.json();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

// ─── Tab Switching ──────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-content-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'expenses') loadRange();
  if (tab === 'debts') loadDebts();
  if (tab === 'goals') loadGoals();
}

// ─── EXPENSES ───────────────────────────────────────────────

async function addExpense() {
  if (editId !== null) {
    // Currently editing — treat as save
    await saveExpense(editId);
    return;
  }

  const merchant = document.getElementById('merchant').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const date = document.getElementById('expenseDate').value;

  if (!merchant || !amount || !date) {
    showToast('Fill in merchant, amount, and date', 'error');
    return;
  }

  const data = await api('/api/expenses', {
    method: 'POST',
    body: JSON.stringify({ merchant, amount, category, date })
  });

  if (data.ok) {
    document.getElementById('merchant').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('expenseDate').value = todayStr();
    showToast('Expense added!', 'success');
    loadRange();
    document.getElementById('merchant').focus();
  } else {
    showToast(data.error || 'Failed to save', 'error');
  }
}

async function confirmDelete(id) {
  if (!confirm('Delete this expense?')) return;
  const data = await api('/api/expenses/delete?id=' + id, { method: 'POST' });
  if (data.ok) {
    showToast('Deleted', 'success');
    loadRange();
  }
}

function editExpense(id, merchant, amount, category, date) {
  editId = id;
  document.getElementById('merchant').value = merchant;
  document.getElementById('amount').value = amount;
  
  // Set the category select
  const catSelect = document.getElementById('category');
  for (let i = 0; i < catSelect.options.length; i++) {
    if (catSelect.options[i].value === category) {
      catSelect.selectedIndex = i;
      break;
    }
  }
  
  document.getElementById('expenseDate').value = date;
  
  // Change button to show "Save" and show cancel btn
  const addBtn = document.getElementById('addExpenseBtn');
  addBtn.textContent = '💾 Save';
  addBtn.style.background = '#065f46';
  addBtn.style.color = '#6ee7b7';
  addBtn.onclick = function() { saveExpense(editId); };
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  document.getElementById('merchant').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('merchant').focus();
}

async function saveExpense(id) {
  const merchant = document.getElementById('merchant').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  const date = document.getElementById('expenseDate').value;

  if (!merchant || !amount || !date) {
    showToast('Fill in merchant, amount, and date', 'error');
    return;
  }

  const data = await api('/api/expenses/update', {
    method: 'POST',
    body: JSON.stringify({ id, merchant, amount, category, date })
  });

  if (data.ok) {
    cancelEdit();
    showToast('Expense updated!', 'success');
    loadRange();
  } else {
    showToast(data.error || 'Failed to update', 'error');
  }
}

function cancelEdit() {
  editId = null;
  document.getElementById('merchant').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('expenseDate').value = todayStr();
  const addBtn = document.getElementById('addExpenseBtn');
  addBtn.textContent = 'Add';
  addBtn.style.background = '#f59e0b';
  addBtn.style.color = '#0a0a0f';
  addBtn.onclick = function() { addExpense(); };
  document.getElementById('cancelEditBtn').style.display = 'none';
}

async function loadRange() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;

  if (!startDate || !endDate) {
    showToast('Select date range', 'error');
    return;
  }

  const data = await api('/api/expenses/list?start_date=' + startDate + '&end_date=' + endDate);

  document.getElementById('totalExpenses').textContent = 'Rp ' + formatIDR(data.total_expenses);
  document.getElementById('totalCategories').textContent = (data.categories || []).length;
  document.getElementById('totalTransactions').textContent = (data.transactions || []).length;
  document.getElementById('rangeLabel').textContent = startDate + ' → ' + endDate;

  // Category list
  const catList = document.getElementById('categoryList');
  catList.innerHTML = '';
  (data.categories || []).forEach(c => {
    const div = document.createElement('div');
    div.className = 'cat-item';
    div.innerHTML = '<span class="cat-name">' + escapeHtml(c.category) + '</span><span class="cat-amount">Rp ' + formatIDR(c.total) + '</span>';
    catList.appendChild(div);
  });

  // Category chart
  const ctx = document.getElementById('categoryChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  if (data.categories && data.categories.length > 0) {
    const colors = ['#f59e0b','#34d399','#3b82f6','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: data.categories.map(c => c.category),
        datasets: [{
          data: data.categories.map(c => c.total),
          backgroundColor: colors.slice(0, data.categories.length),
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { display: false } }
      }
    });
  }

  // Transactions table
  const tbody = document.getElementById('expenseList');
  tbody.innerHTML = '';
  const empty = document.getElementById('emptyState');

  if (data.transactions && data.transactions.length > 0) {
    empty.style.display = 'none';
    data.transactions.forEach(t => {
      const tr = document.createElement('tr');

      const tdDate = document.createElement('td');
      tdDate.textContent = t.date;
      tr.appendChild(tdDate);

      const tdMerchant = document.createElement('td');
      tdMerchant.textContent = t.merchant;
      tr.appendChild(tdMerchant);

      const tdCategory = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'category-badge';
      badge.textContent = t.category;
      tdCategory.appendChild(badge);
      tr.appendChild(tdCategory);

      const tdAmount = document.createElement('td');
      tdAmount.style.textAlign = 'right';
      tdAmount.style.color = '#ef4444';
      tdAmount.style.fontWeight = '600';
      tdAmount.textContent = 'Rp ' + formatIDR(t.amount);
      tr.appendChild(tdAmount);

      // Edit button
      const tdEdit = document.createElement('td');
      const editBtn = document.createElement('button');
      editBtn.className = 'delete-btn';
      editBtn.textContent = '✎';
      editBtn.title = 'Edit';
      editBtn.style.color = '#f59e0b';
      editBtn.onclick = function() { editExpense(t.id, t.merchant, t.amount, t.category, t.date); };
      tdEdit.appendChild(editBtn);
      tr.appendChild(tdEdit);

      // Delete button
      const tdDelete = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';
      delBtn.onclick = function() { confirmDelete(t.id); };
      tdDelete.appendChild(delBtn);
      tr.appendChild(tdDelete);

      // Highlight row if it's the one being edited
      if (editId === t.id) {
        tr.style.background = '#1a1a2e';
      }

      tbody.appendChild(tr);
    });
  } else {
    empty.style.display = 'block';
  }
}

// ─── DEBTS ──────────────────────────────────────────────────

async function addDebt() {
  const name = document.getElementById('debtName').value.trim();
  const amount = parseFloat(document.getElementById('debtAmount').value);
  const priority = document.getElementById('debtPriority').value;

  if (!name || !amount) {
    showToast('Fill in name and amount', 'error');
    return;
  }

  const data = await api('/api/debts', {
    method: 'POST',
    body: JSON.stringify({ name, total_amount: amount, priority })
  });

  if (data.ok) {
    document.getElementById('debtName').value = '';
    document.getElementById('debtAmount').value = '';
    showToast('Debt added!', 'success');
    loadDebts();
  } else {
    showToast(data.error || 'Failed to save', 'error');
  }
}

async function deleteDebt(id) {
  if (!confirm('Delete this debt and all payments?')) return;
  const data = await api('/api/debts/delete?id=' + id, { method: 'POST' });
  if (data.ok) {
    showToast('Debt deleted', 'success');
    loadDebts();
  }
}

async function addPayment(debtId) {
  const amountInput = document.getElementById('pay-amount-' + debtId);
  const dateInput = document.getElementById('pay-date-' + debtId);
  const amount = parseFloat(amountInput.value);
  const date = dateInput.value;

  if (!amount || !date) {
    showToast('Enter amount and date', 'error');
    return;
  }

  const data = await api('/api/debts/payments', {
    method: 'POST',
    body: JSON.stringify({ debt_id: debtId, amount, date })
  });

  if (data.ok) {
    amountInput.value = '';
    showToast('Payment logged!', 'success');
    loadDebts();
  } else {
    showToast(data.error || 'Failed to save', 'error');
  }
}

async function loadDebts() {
  const debts = await api('/api/debts/list');

  const listEl = document.getElementById('debtList');
  const summaryEl = document.getElementById('debtSummary');
  listEl.innerHTML = '';

  if (!debts || debts.length === 0) {
    summaryEl.style.display = 'none';
    listEl.innerHTML = '<div class="card"><div class="empty-state">No debts tracked yet. Add one above!</div></div>';
    return;
  }

  summaryEl.style.display = 'block';

  let totalAmount = 0, totalPaid = 0, totalRemaining = 0;
  debts.forEach(d => {
    totalAmount += d.debt.total_amount;
    totalPaid += d.total_paid;
    totalRemaining += d.debt.remaining;
  });

  document.getElementById('totalDebtAmount').textContent = 'Rp ' + formatIDR(totalAmount);
  document.getElementById('totalDebtPaid').textContent = 'Rp ' + formatIDR(totalPaid);
  document.getElementById('totalDebtRemaining').textContent = 'Rp ' + formatIDR(totalRemaining);

  debts.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
        <div>
          <strong style="font-size:15px;color:#fff">${escapeHtml(d.debt.name)}</strong>
          <span class="priority-badge ${d.debt.priority}" style="margin-left:8px">${d.debt.priority}</span>
          ${d.debt.description ? '<div style="color:#666;font-size:12px;margin-top:2px">' + escapeHtml(d.debt.description) + '</div>' : ''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteDebt(${d.debt.id})">✕</button>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px">
        <div style="font-size:13px"><span style="color:#888">Total:</span> <span style="color:#ef4444;font-weight:600">Rp ${formatIDR(d.debt.total_amount)}</span></div>
        <div style="font-size:13px"><span style="color:#888">Paid:</span> <span style="color:#34d399;font-weight:600">Rp ${formatIDR(d.total_paid)}</span></div>
        <div style="font-size:13px"><span style="color:#888">Remaining:</span> <span style="color:#f59e0b;font-weight:600">Rp ${formatIDR(d.debt.remaining)}</span></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${d.debt.priority}" style="width:${d.progress}%"></div>
      </div>
      <div style="text-align:right;font-size:11px;color:#666;margin-top:4px">${d.progress}% paid off</div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #1a1a2e">
        <div class="form-row">
          <div class="form-group" style="max-width:120px">
            <label>Payment</label>
            <input type="number" id="pay-amount-${d.debt.id}" placeholder="0">
          </div>
          <div class="form-group" style="max-width:130px">
            <label>Date</label>
            <input type="date" id="pay-date-${d.debt.id}">
          </div>
          <div class="form-group" style="max-width:80px;align-self:flex-end">
            <button class="btn btn-sm" onclick="addPayment(${d.debt.id})">Pay</button>
          </div>
        </div>
      </div>
    `;
    // Set default date
    const dateInput = card.querySelector('input[type="date"]');
    if (dateInput) dateInput.value = new Date().toISOString().split('T')[0];
    listEl.appendChild(card);
  });
}

// ─── GOALS ──────────────────────────────────────────────────

async function addGoal() {
  const name = document.getElementById('goalName').value.trim();
  const target = parseFloat(document.getElementById('goalTarget').value);
  const priority = document.getElementById('goalPriority').value;

  if (!name || !target) {
    showToast('Fill in name and target amount', 'error');
    return;
  }

  const data = await api('/api/goals', {
    method: 'POST',
    body: JSON.stringify({ name, target_amount: target, priority })
  });

  if (data.ok) {
    document.getElementById('goalName').value = '';
    document.getElementById('goalTarget').value = '';
    showToast('Goal added!', 'success');
    loadGoals();
  } else {
    showToast(data.error || 'Failed to save', 'error');
  }
}

async function updateGoal(id) {
  const input = document.getElementById('goal-progress-' + id);
  const amount = parseFloat(input.value);

  if (amount < 0) {
    showToast('Amount must be >= 0', 'error');
    return;
  }

  const data = await api('/api/goals/update?id=' + id, {
    method: 'POST',
    body: JSON.stringify({ current_amount: amount })
  });

  if (data.ok) {
    input.value = '';
    showToast('Progress updated!', 'success');
    loadGoals();
  } else {
    showToast(data.error || 'Failed to update', 'error');
  }
}

async function deleteGoal(id) {
  if (!confirm('Delete this goal?')) return;
  const data = await api('/api/goals/delete?id=' + id, { method: 'POST' });
  if (data.ok) {
    showToast('Goal deleted', 'success');
    loadGoals();
  }
}

async function loadGoals() {
  const goals = await api('/api/goals/list');
  const listEl = document.getElementById('goalList');
  listEl.innerHTML = '';

  if (!goals || goals.length === 0) {
    listEl.innerHTML = '<div class="card"><div class="empty-state">No goals yet. Add your wishlist above!</div></div>';
    return;
  }

  goals.forEach(g => {
    const card = document.createElement('div');
    card.className = 'card';
    const remaining = g.goal.target_amount - g.goal.current_amount;
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
        <div>
          <strong style="font-size:15px;color:#fff">${escapeHtml(g.goal.name)}</strong>
          <span class="priority-badge ${g.goal.priority}" style="margin-left:8px">${g.goal.priority}</span>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteGoal(${g.goal.id})">✕</button>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px">
        <div style="font-size:13px"><span style="color:#888">Target:</span> <span style="color:#f59e0b;font-weight:600">Rp ${formatIDR(g.goal.target_amount)}</span></div>
        <div style="font-size:13px"><span style="color:#888">Saved:</span> <span style="color:#34d399;font-weight:600">Rp ${formatIDR(g.goal.current_amount)}</span></div>
        <div style="font-size:13px"><span style="color:#888">Remaining:</span> <span style="color:#ef4444;font-weight:600">Rp ${formatIDR(remaining)}</span></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${g.goal.priority}" style="width:${g.progress}%"></div>
      </div>
      <div style="text-align:right;font-size:11px;color:#666;margin-top:4px">${g.progress}% of target</div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #1a1a2e">
        <div class="form-row">
          <div class="form-group" style="max-width:150px">
            <label>Total Saved So Far</label>
            <input type="number" id="goal-progress-${g.goal.id}" placeholder="${g.goal.current_amount}">
          </div>
          <div class="form-group" style="max-width:80px;align-self:flex-end">
            <button class="btn btn-sm" onclick="updateGoal(${g.goal.id})">Save</button>
          </div>
        </div>
      </div>
    `;
    listEl.appendChild(card);
  });
}

// ─── Utilities ──────────────────────────────────────────────

function formatIDR(n) {
  return Math.round(n).toLocaleString('id-ID');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

// Load on page load
initDates();
</script>
