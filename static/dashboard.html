<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Finance Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f;
    color: #e5e5e5;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a3e;
    background: #12121a;
  }
  nav h2 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  nav button {
    background: none;
    border: 1px solid #2a2a3e;
    color: #888;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  nav button:hover {
    border-color: #ef4444;
    color: #ef4444;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px;
    text-align: center;
  }
  .welcome {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }
  .sub {
    color: #888;
    font-size: 14px;
  }
  .badge {
    display: inline-block;
    background: #065f46;
    color: #6ee7b7;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 20px;
  }
</style>
</head>
<body>
<nav>
  <h2>📊 Finance Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>
<div class="container">
  <div class="welcome">✅ Logged in</div>
  <div class="sub">More features coming soon — debts, wishlist, income tracker.</div>
  <div class="badge">MVP v0.1 — Auth only</div>
</div>
<script>
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
}
</script>
</body>
</html>
