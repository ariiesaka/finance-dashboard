<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Finance Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f;
    color: #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #12121a;
    border: 1px solid #2a2a3e;
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    max-width: 90vw;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
  }
  p {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  .input-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #2a2a3e;
    background: #0a0a0f;
    color: #e5e5e5;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus {
    border-color: #f59e0b;
  }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #f59e0b;
    color: #0a0a0f;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  button:hover {
    background: #d97706;
  }
  .error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
  .error.show {
    display: block;
  }
  .lock {
    font-size: 32px;
    text-align: center;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔐</div>
  <h1>Finance Dashboard</h1>
  <p>Enter your password to continue</p>
  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autofocus>
  </div>
  <button onclick="login()">Sign In</button>
  <div class="error" id="error">Wrong password</div>
</div>
<script>
async function login() {
  const pw = document.getElementById('password');
  const err = document.getElementById('error');
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw.value })
  });
  const data = await res.json();
  if (data.ok) {
    window.location.href = '/dashboard.html';
  } else {
    err.textContent = data.error || 'Wrong password';
    err.classList.add('show');
    pw.value = '';
    pw.focus();
  }
}
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
